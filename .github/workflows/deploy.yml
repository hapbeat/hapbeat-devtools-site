name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      - name: Build (fetch-docs + astro build)
        run: npm run build
        env:
          FETCH_DOCS_MODE: git
          # Cross-repo private clone token. Optional: if not set, fetch-docs falls back to placeholders.
          # 設定する場合: org の private repo を read できる fine-grained PAT を Settings > Secrets で DOCS_FETCH_TOKEN に登録。
          DOCS_FETCH_TOKEN: ${{ secrets.DOCS_FETCH_TOKEN }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /
          local-dir: ./dist/
          # /studio/ 配下は別 repo (hapbeat-studio) のデプロイ対象。
          # このデプロイでは触らないように除外する。
          exclude: |
            studio/**
            studio/
