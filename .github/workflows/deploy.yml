name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
  # 他リポジトリの docs/ 変更通知で起動するためのフック。
  # 各サブ repo (hapbeat-helper / hapbeat-studio / ...) は
  # docs/** を含む push 時に repository_dispatch (event_type: docs-updated)
  # でこのワークフローを叩いて、Astro 側の fetch-docs を再走させる。
  # PAT は各サブ repo の secret `DOCS_SITE_DISPATCH_TOKEN` に格納。
  repository_dispatch:
    types: [docs-updated]

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      # rehype-mermaid (strategy: inline-svg) は Playwright で chromium を起動して
      # mermaid を SVG に SSR する。CI runner には未インストールなので明示的に入れる。
      # これが無いと initial-setup.md など mermaid を含むページが空ボディで生成されて
      # FTP に上がってしまう (build 自体はエラーにならない)。
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Build (fetch-docs + astro build)
        run: npm run build
        env:
          FETCH_DOCS_MODE: git
          # Cross-repo private clone token. Optional: if not set, fetch-docs falls back to placeholders.
          # 設定する場合: org の private repo を read できる fine-grained PAT を Settings > Secrets で DOCS_FETCH_TOKEN に登録。
          DOCS_FETCH_TOKEN: ${{ secrets.DOCS_FETCH_TOKEN }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /
          local-dir: ./dist/
          # /studio/ 配下は別 repo (hapbeat-studio) のデプロイ対象。
          # このデプロイでは触らないように除外する。
          exclude: |
            studio/**
            studio/
